<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    GrassTakers Admin Dashboard
  </title>

  <style>

    body {
      font-family: Arial, sans-serif;
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    h1 {
      color: green;
    }

    .booking {
      border: 1px solid #ccc;
      border-radius: 8px;
      padding: 15px;
      margin-bottom: 15px;
    }

    button {
      background: red;
      color: white;
      border: none;
      padding: 8px 12px;
      cursor: pointer;
      border-radius: 4px;
    }

    button:hover {
      opacity: 0.9;
    }

  </style>

</head>

<body>

<script>

const token =
  localStorage.getItem(
    'adminToken'
  );

if (!token) {

  window.location =
    '/admin-login.html';

}

</script>

<h1>
  GrassTakers Admin Dashboard
</h1>

<p>
  All customer bookings
</p>

<div id="bookings">
  Loading bookings...
</div>

<script>

const API_URL =
  'https://grasstakers-ai.onrender.com';

async function loadBookings() {

  try {

    const response =
      await fetch(
        `${API_URL}/api/bookings`
      );

    const bookings =
      await response.json();

    const container =
      document.getElementById(
        'bookings'
      );

    if (
      !bookings ||
      bookings.length === 0
    ) {

      container.innerHTML =
        '<p>No bookings found.</p>';

      return;

    }

    container.innerHTML = '';

    bookings.forEach(
      booking => {

        const div =
          document.createElement(
            'div'
          );

        div.className =
          'booking';

        div.innerHTML = `

          <h3>
            Booking #${booking.id}
          </h3>

          <p>
            <strong>Name:</strong>
            ${booking.name || ''}
          </p>

          <p>
            <strong>Phone:</strong>
            ${booking.phone || ''}
          </p>

          <p>
            <strong>Address:</strong>
            ${booking.address || ''}
          </p>

          <p>
            <strong>Service:</strong>
            ${booking.service || ''}
          </p>

          <p>
            <strong>Message:</strong>
            ${booking.message || ''}
          </p>

          <button
            onclick="deleteBooking(${booking.id})"
          >
            Delete Booking
          </button>

        `;

        container.appendChild(
          div
        );

      }
    );

  } catch (error) {

    console.log(error);

    document.getElementById(
      'bookings'
    ).innerHTML =
      'Failed to load bookings';

  }

}

async function deleteBooking(
  id
) {

  const confirmed =
    confirm(
      'Delete this booking?'
    );

  if (!confirmed) {
    return;
  }

  try {

    const response =
      await fetch(
        `${API_URL}/api/bookings/${id}`,
        {
          method: 'DELETE'
        }
      );

    const data =
      await response.json();

    if (data.success) {

      loadBookings();

    } else {

      alert(
        'Delete failed'
      );

    }

  } catch (error) {

    console.log(error);

    alert(
      'Server error'
    );

  }

}

loadBookings();

</script>

</body>
</html>
