<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GrassTakers Admin</title>

  <style>

    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 40px;
    }

    h1 {
      color: #4ade80;
    }

    .booking {

      background: #1f1f1f;
      padding: 20px;
      margin-bottom: 20px;
      border-radius: 10px;

    }

    button {

      background: red;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 8px;
      cursor: pointer;

    }

  </style>

</head>

<body>

  <h1>GrassTakers Admin Dashboard</h1>

  <div id="bookings"></div>
const token =
  localStorage.getItem(
    'adminToken'
  );

if (!token) {

  window.location =
    '/admin-login.html';

}
  <script>

    const API_URL =
      'https://grasstakers-ai.onrender.com';

    async function loadBookings() {

      const response = await fetch(
        `${API_URL}/api/bookings`
      );

      const bookings =
        await response.json();

      const bookingsDiv =
        document.getElementById(
          'bookings'
        );

      bookingsDiv.innerHTML = '';

      bookings.forEach((booking) => {

        bookingsDiv.innerHTML += `

          <div class="booking">

            <h3>${booking.name}</h3>

            <p>
              <strong>Phone:</strong>
              ${booking.phone}
            </p>

            <p>
              <strong>Address:</strong>
              ${booking.address}
            </p>

            <p>
              <strong>Service:</strong>
              ${booking.service}
            </p>

            <p>
              <strong>Message:</strong>
              ${booking.message}
            </p>

            <button
              onclick="deleteBooking(${booking.id})"
            >
              Delete
            </button>

          </div>

        `;

      });

    }

    async function deleteBooking(id) {

      await fetch(
        `${API_URL}/api/bookings/${id}`,
        {
          method: 'DELETE'
        }
      );

      loadBookings();

    }

    loadBookings();

  </script>

</body>

</html>
