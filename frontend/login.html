<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8">

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  >

  <title>
    GrassTakers Admin Login
  </title>

  <style>

    body {

      font-family: Arial;

      background: #f2f7f2;

      display: flex;

      justify-content: center;

      align-items: center;

      height: 100vh;
    }

    .login-box {

      background: white;

      padding: 40px;

      border-radius: 20px;

      width: 350px;

      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
    }

    h2 {

      margin-bottom: 25px;

      color: #1f7a36;
    }

    input {

      width: 100%;

      padding: 14px;

      margin-bottom: 15px;

      border-radius: 10px;

      border: 1px solid #ccc;
    }

    button {

      width: 100%;

      background: #1f7a36;

      color: white;

      border: none;

      padding: 14px;

      border-radius: 10px;

      cursor: pointer;
    }

    .error {

      margin-top: 15px;

      color: red;
    }

  </style>

</head>

<body>

  <div class="login-box">

    <h2>
      🌿 Admin Login
    </h2>

    <input
      type="text"
      id="username"
      placeholder="Username"
    >

    <input
      type="password"
      id="password"
      placeholder="Password"
    >

    <button onclick="login()">

      Login

    </button>

    <div
      class="error"
      id="error"
    ></div>

  </div>

  <script>

    async function login() {

      const username =
        document.getElementById('username').value;

      const password =
        document.getElementById('password').value;

      try {

        const response = await fetch(

          'http://localhost:3001/api/login',

          {

            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              username,
              password
            })
          }
        );

        const data = await response.json();

        if (data.token) {

          localStorage.setItem(
            'token',
            data.token
          );

          window.location.href =
            'admin.html';

        } else {

          document.getElementById(
            'error'
          ).innerHTML =

            'Invalid login';
        }

      } catch (error) {

        console.log(error);
      }
    }

  </script>

</body>
</html>
