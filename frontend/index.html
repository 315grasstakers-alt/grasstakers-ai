<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GrassTakers AI</title>

  <style>
<div class="booking-box">

  <h2>Book Lawn Service</h2>

  <input
    type="text"
    id="name"
    placeholder="Your Name"
  />

  <input
    type="text"
    id="phone"
    placeholder="Phone Number (Optional)"
  />

  <input
    type="text"
    id="address"
    placeholder="Property Address"
  />

  <select id="service">

    <option>Lawn Mowing</option>
    <option>Fertilization</option>
    <option>Aeration</option>
    <option>Leaf Cleanup</option>

  </select>

  <label>Yard Size</label>

  <select id="yardSize">

    <option value="Small">
      Small
    </option>

    <option value="Medium">
      Medium
    </option>

    <option value="Large">
      Large
    </option>

  </select>

  <button
    type="button"
    onclick="getQuote()"
  >
    Get Instant Quote
  </button>

  <div id="quoteResult"></div>

  <textarea
    id="bookingMessage"
    placeholder="Additional details..."
  ></textarea>

  <button onclick="submitBooking()">
    Submit Booking
  </button>

  <div id="bookingResponse"></div>

</div>
  </style>

</head>

<body>

  <h1>GrassTakers AI</h1>

  <p>AI-powered lawn care assistant</p>

  <input
    type="text"
    id="message"
    placeholder="Ask GrassTakers AI..."
  />

  <button onclick="askAI()">
    Ask AI
  </button>

  <div
    class="response"
    id="response"
  >
    Your AI response will appear here.
  </div>

  <div class="booking-box">

    <h2>Book Lawn Service</h2>

    <input
      type="text"
      id="name"
      placeholder="Your Name"
    />

    <input
      type="text"
      id="phone"
      placeholder="Phone Number"
    />

    <input
      type="text"
      id="address"
      placeholder="Property Address"
    />

    <select id="service">

      <option>Lawn Mowing</option>
      <option>Fertilization</option>
      <option>Aeration</option>
      <option>Leaf Cleanup</option>

    </select>

    <textarea
      id="bookingMessage"
      placeholder="Additional details..."
    ></textarea>

    <button onclick="submitBooking()">
      Submit Booking
    </button>

    <div id="bookingResponse"></div>

  </div>

  <div class="services">

    <div class="card">
      <h3>Lawn Mowing</h3>
      <p>Starting at $45</p>
    </div>

    <div class="card">
      <h3>Fertilization</h3>
      <p>Starting at $75</p>
    </div>

    <div class="card">
      <h3>Aeration</h3>
      <p>Starting at $150</p>
    </div>

    <div class="card">
      <h3>Leaf Cleanup</h3>
      <p>Seasonal cleanups available</p>
    </div>

  </div>

  <script src="app.js"></script>

</body>

</html>
