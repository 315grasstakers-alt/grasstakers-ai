<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GrassTakers AI</title>

  <style>

    body {

      font-family: Arial, sans-serif;
      background: #f4f4f4;
      margin: 0;
      padding: 0;
      text-align: center;
    }

    .container {

      max-width: 800px;
      margin: auto;
      padding: 40px 20px;
    }

    h1 {

      color: green;
      font-size: 48px;
      margin-bottom: 10px;
    }

    p {

      color: #555;
      margin-bottom: 30px;
    }

    input {

      width: 70%;
      padding: 15px;
      border-radius: 8px;
      border: 1px solid #ccc;
      font-size: 16px;
    }

    button {

      padding: 15px 25px;
      border: none;
      border-radius: 8px;
      background: green;
      color: white;
      font-size: 16px;
      cursor: pointer;
      margin-left: 10px;
    }

    button:hover {

      background: darkgreen;
    }

    .response {

      margin-top: 30px;
      padding: 20px;
      background: white;
      border-radius: 10px;
      min-height: 50px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

    .services {

      margin-top: 50px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {

      background: white;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }

  </style>

</head>

<body>

  <div class="container">

    <h1>GrassTakers AI</h1>

    <p>
      AI-powered lawn care assistant
    </p>

    <input
      type="text"
      id="message"
      placeholder="Ask GrassTakers AI..."
    />

    <button onclick="askAI()">
      Ask AI
    </button>

    <div
      class="response"
      id="response"
    >
      Your AI response will appear here.
    </div>

    <div class="services">

      <div class="card">
        <h3>Lawn Mowing</h3>
        <p>Starting at $45</p>
      </div>

      <div class="card">
        <h3>Fertilization</h3>
        <p>Starting at $75</p>
      </div>

      <div class="card">
        <h3>Aeration</h3>
        <p>Starting at $150</p>
      </div>

      <div class="card">
        <h3>Leaf Cleanup</h3>
        <p>Seasonal cleanups available</p>
      </div>

    </div>

  </div>

  <script>

    async function askAI() {

      const message =
        document.getElementById('message').value;

      const responseBox =
        document.getElementById('response');

      if (!message) {

        responseBox.innerHTML =
          'Please enter a message';

        return;
      }

      responseBox.innerHTML =
        'Thinking...';

      try {

        const response = await fetch(
          'https://grasstakers-ai.onrender.com/api/chat',
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              message: message
            })
          }
        );

        const data = await response.json();

        responseBox.innerHTML =
          data.reply || data.error;

      } catch (error) {

        console.log(error);

        responseBox.innerHTML =
          'Server connection failed';
      }
    }

  </script>

</body>
</html>
