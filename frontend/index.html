<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>GrassTakers AI</title>

  <style>
    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #39ff14;
    }

    input {
      width: 300px;
      padding: 12px;
      border-radius: 8px;
      border: none;
      margin-top: 20px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #39ff14;
      color: black;
      font-weight: bold;
      cursor: pointer;
      margin-left: 10px;
    }

    .response {
      margin-top: 20px;
      padding: 20px;
      background: #1e1e1e;
      border-radius: 10px;
      max-width: 700px;
      margin-left: auto;
      margin-right: auto;
    }

    .services {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
      gap: 20px;
      margin-top: 40px;
    }

    .card {
      background: #1e1e1e;
      padding: 20px;
      border-radius: 12px;
    }
  </style>
</head>

<body>

  <h1>GrassTakers AI</h1>

  <p>AI-powered lawn care assistant</p>

  <input
    type="text"
    id="message"
    placeholder="Ask GrassTakers AI..."
  />

  <button onclick="askAI()">Ask AI</button>

  <div class="response" id="response">
    Your AI response will appear here.
  </div>

  <div class="services">

    <div class="card">
      <h3>Lawn Mowing</h3>
      <p>Starting at $45</p>
    </div>

    <div class="card">
      <h3>Fertilization</h3>
      <p>Starting at $75</p>
    </div>

    <div class="card">
      <h3>Aeration</h3>
      <p>Starting at $150</p>
    </div>

    <div class="card">
      <h3>Leaf Cleanup</h3>
      <p>Seasonal cleanups available</p>
    </div>

  </div>

  <script>
    async function askAI() {

      const message =
        document.getElementById('message').value;

      if (!message) {
        alert('Please enter a message');
        return;
      }

      document.getElementById('response').innerText =
        'Thinking...';

      try {

        const response = await fetch(
          'https://grasstakers-ai.onrender.com/api/chat',
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              message: message
            })
          }
        );

        const data = await response.json();

        document.getElementById('response').innerText =
          data.reply || 'No response from AI';

      } catch (error) {

        console.log(error);

        document.getElementById('response').innerText =
          'Server connection failed';

      }
    }
  </script>

</body>
</html>
