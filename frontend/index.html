<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GrassTakers AI</title>

  <style>

    body {

      margin: 0;
      padding: 0;

      background: #0f172a;

      color: white;

      font-family: Arial, sans-serif;

    }

    .container {

      max-width: 1000px;

      margin: auto;

      padding: 40px 20px;

    }

    h1 {

      text-align: center;

      color: #22c55e;

      font-size: 52px;

      margin-bottom: 10px;

    }

    .subtitle {

      text-align: center;

      color: #cbd5e1;

      margin-bottom: 40px;

    }

    .chat-box {

      display: flex;

      gap: 10px;

      margin-bottom: 20px;

    }

    input {

      flex: 1;

      padding: 15px;

      border-radius: 10px;

      border: none;

      font-size: 16px;

    }

    button {

      padding: 15px 25px;

      background: #22c55e;

      color: white;

      border: none;

      border-radius: 10px;

      cursor: pointer;

      font-size: 16px;

      font-weight: bold;

    }

    button:hover {

      background: #16a34a;

    }

    .response {

      background: #1e293b;

      padding: 20px;

      border-radius: 10px;

      min-height: 80px;

      line-height: 1.6;

      margin-bottom: 50px;

    }

    .services {

      display: grid;

      grid-template-columns: repeat(
        auto-fit,
        minmax(220px, 1fr)
      );

      gap: 20px;

    }

    .card {

      background: #1e293b;

      padding: 20px;

      border-radius: 10px;

      text-align: center;

    }

    .card h3 {

      color: #22c55e;

    }

  </style>

</head>

<body>

  <div class="container">

    <h1>GrassTakers AI</h1>

    <p class="subtitle">
      AI-powered lawn care assistant
    </p>

    <div class="chat-box">

      <input
        type="text"
        id="message"
        placeholder="Ask about lawn care..."
      />

      <button onclick="askAI()">
        Ask AI
      </button>

    </div>

    <div
      class="response"
      id="response"
    >
      Your AI response will appear here.
    </div>

    <div class="services">

      <div class="card">

        <h3>Lawn Mowing</h3>

        <p>Starting at $45</p>

      </div>

      <div class="card">

        <h3>Fertilization</h3>

        <p>Starting at $75</p>

      </div>

      <div class="card">

        <h3>Aeration</h3>

        <p>Starting at $150</p>

      </div>

      <div class="card">

        <h3>Leaf Cleanup</h3>

        <p>Seasonal cleanups available</p>

      </div>

    </div>

  </div>

  <script>

    async function askAI() {

      const message =
        document.getElementById('message').value;

      const responseBox =
        document.getElementById('response');

      if (!message) {

        alert('Please enter a message');

        return;

      }

      responseBox.innerHTML =
        'Thinking...';

      try {

        const response = await fetch(
          'https://grasstakers-ai.onrender.com/api/chat',
          {
            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              message: message
            })

          }
        );

        const data =
          await response.json();

        responseBox.innerHTML =
          data.reply ||
          'No response returned';

      } catch (error) {

        console.log(error);

        responseBox.innerHTML =
          'Server connection failed';

      }

    }

  </script>

</body>

</html>
