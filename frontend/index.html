<!DOCTYPE html>
<html lang="en">

<head>

  <meta charset="UTF-8" />

  <meta
    name="viewport"
    content="width=device-width, initial-scale=1.0"
  />

  <title>GrassTakers AI</title>

  <style>

    body {
      font-family: Arial;
      background: #111;
      color: white;
      padding: 40px;
      text-align: center;
    }

    h1 {
      color: #00ff88;
    }

    input {
      width: 300px;
      padding: 12px;
      border: none;
      border-radius: 8px;
      margin-bottom: 10px;
    }

    button {
      padding: 12px 20px;
      border: none;
      border-radius: 8px;
      background: #00ff88;
      color: black;
      font-weight: bold;
      cursor: pointer;
    }

    .response {
      margin-top: 20px;
      padding: 20px;
      background: #222;
      border-radius: 10px;
      min-height: 50px;
    }

    .services {
      margin-top: 40px;
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 20px;
    }

    .card {
      background: #1d1d1d;
      padding: 20px;
      border-radius: 10px;
    }

  </style>

</head>

<body>

  <h1>GrassTakers AI</h1>

  <p>AI-powered lawn care assistant</p>

  <input
    type="text"
    id="message"
    placeholder="Ask GrassTakers AI..."
  />

  <br><br>

  <button onclick="askAI()">
    Ask AI
  </button>

  <div
    class="response"
    id="response"
  >
    Your AI response will appear here.
  </div>

  <div class="services">

    <div class="card">
      <h3>Lawn Mowing</h3>
      <p>Starting at $45</p>
    </div>

    <div class="card">
      <h3>Fertilization</h3>
      <p>Starting at $75</p>
    </div>

    <div class="card">
      <h3>Aeration</h3>
      <p>Starting at $150</p>
    </div>

    <div class="card">
      <h3>Leaf Cleanup</h3>
      <p>Seasonal cleanups available</p>
    </div>

  </div>

  <script>

    async function askAI() {

      const message =
        document.getElementById('message').value;

      const responseBox =
        document.getElementById('response');

      if (!message) {

        responseBox.innerText =
          'Please enter a message';

        return;
      }

      responseBox.innerText =
        'Loading...';

      try {

        const response = await fetch(
          'https://grasstakers-ai.onrender.com/api/chat',
          {

            method: 'POST',

            headers: {
              'Content-Type': 'application/json'
            },

            body: JSON.stringify({
              message: message
            })

          }
        );

        const data = await response.json();

        console.log(data);

        responseBox.innerText =
          data.reply ||
          data.error ||
          'No response returned';

      } catch (error) {

        console.log(error);

        responseBox.innerText =
          'Server connection failed';

      }

    }

  </script>

</body>
</html>
